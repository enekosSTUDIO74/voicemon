apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: TimescaleDB
    type: postgres
    uid: timescale
    access: proxy
    url: timescale:5432
    database: voicemon
    user: voicemon
    secureJsonData:
      password: voicemon
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    editable: true
